  # Utilities
  /utilities/health:
    get:
      summary: API health check
      description: |
        Check the health status of the API. Returns current operational status, version 
        information, and uptime. No authentication required.

        **Response (Healthy - 200 OK):**
        - `status`: "healthy"
        - `timestamp`: Current server time (ISO 8601)
        - `version`: Current API version (e.g., "0.4.0")
        - `uptime`: API uptime in seconds

        **Response (Unhealthy - 503 Service Unavailable):**
        - `status`: "unhealthy"
        - `timestamp`: Current server time (ISO 8601)
        - `errors`: Array of error messages describing failures

        **Authentication:** Not required (public endpoint for monitoring)

        **Why No Authentication:**
        This endpoint intentionally allows unauthenticated access to support:
        - External monitoring services
        - Pre-authentication health verification
        - Load balancer health checks
        - Public status pages

        **Common Use Cases:**
        - Monitoring and alerting systems (200): Periodic health checks for uptime monitoring
        - Load balancer health checks (200): Verify API availability
        - Verify API availability before operations (200): Pre-flight check before critical tasks
        - Check current API version (200): Review `version` field
        - Calculate uptime for SLA reporting (200): Use `uptime` field
        - Detect service issues (503): Unhealthy status with error details

        **Related Endpoints:**
        - To test authentication: `GET /users` (requires valid Bearer token)
        - To obtain authentication: `POST /auth/token`

        **Best Practices:**
        - Check health before critical operations
        - Cache health status for 30-60 seconds to reduce load
        - Monitor uptime metric for unexpected restarts
        - Alert on 503 responses or error array presence
      tags:
        - Utilities
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                    examples: ["healthy"]
                  timestamp:
                    type: string
                    format: date-time
                    examples: ["2025-01-20T21:01:58Z"]
                  version:
                    type: string
                    examples: ["0.4.0"]
                  uptime:
                    type: integer
                    description: API uptime in seconds
                    examples: [86400]
        "503":
          description: API is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unhealthy]
                    examples: ["unhealthy"]
                  timestamp:
                    type: string
                    format: date-time
                    examples: ["2025-01-20T21:01:58Z"]
                  errors:
                    type: array
                    items:
                      type: string
                    examples:
                      [
                        [
                          "Database connection failed",
                          "External service timeout",
                        ],
                      ]

components:
