  /users/{id}:
    get:
      summary: Get specific user
      description: |
        Retrieve complete information about a specific user by their unique identifier (UUID).

        Returns full user profile including core identity (id, userId, institutionId, email), 
        profile details (name, department, country), organisational context (status, role, 
        employeeId, team), and timestamps (created, updated, expiration, last active, deleted).

        **Path Parameters:**
        - `id`: User UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Response:** Single User object (not wrapped in data array)

        **Notable Fields:**
        - `status`: Either "active" or "removed"
        - `role`: One of "admin", "team lead", or "student"
        - `removedAt`: Nullable - only populated for removed users
        - `username`, `firstName`, `lastName`, `department`, `countryCode`, `employeeId`, `team`: Nullable

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Get full user profile for display (200): `GET /users/{id}`
        - Verify user exists before operations (200 or 404): Check response status
        - Check user's organisational context and permissions (200): Review `role`, `department`, `team` fields
        - User not found (404): Invalid or non-existent user ID
        - Invalid ID format (400): Malformed UUID
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - List all users: `GET /users`
        - View this user's learning progress: `GET /users/{id}/progress`
        - Find progress records for this user: `GET /progress?userId={id}`
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Courses
  /courses:
    get:
      summary: List all courses
      description: |
        Retrieve a paginated list of all available language learning courses with provider-level 
        metadata. Response includes provider information (Busuu) at the top level for context.

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "publishedAt:desc")
        - `level`: Filter by CEFR level (A1, A2, B1, B2, C1)
        - `status`: Filter by "active" or "archived"
        - `difficulty`: Filter by difficulty level (beginner, elementary, intermediate, upper_intermediate, advanced)
        - `search`: Search by title or description (partial match)

        **Response Structure:**
        - `provider`: Content provider information (Busuu)
        - `data`: Array of Course objects with CEFR levels, difficulty ratings, durations, and SSO launch URLs
        - `pagination`: Metadata including page, limit, total, totalPages

        **Launch URL Format:**
        SSO URLs contain template variables: `https://sso.busuu.com/saml/{{busuuInstitutionId}}/login?course={{courseId}}&lang={{language}}&level={{level}}`
        Replace `{{institutionId}}`, `{{courseId}}`, `{{language}}` and `{{level}}` with actual values before use.

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - List all active courses (200): `GET /courses?status=active`
        - Find beginner courses (200): `GET /courses?level=A1&difficulty=beginner`
        - Search for language (200): `GET /courses?search=Spanish`
        - Filter by CEFR level (200): `GET /courses?level=B1&status=active`
        - Get courses for specific difficulty (200): `GET /courses?difficulty=intermediate`
        - Empty result set (200): Query with no matches returns `data: []`
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get specific course details: `GET /courses/{id}`
        - View progress for a course: `GET /progress?courseId={id}`
        - To authenticate first: `POST /auth/token`
      tags:
        - Courses
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: level
          in: query
          description: Filter by course level
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
        - name: status
          in: query
          description: Filter by course status
          schema:
            type: string
            enum: [active, archived]
        - name: difficulty
          in: query
          description: Filter by difficulty level
          schema:
            type: string
            enum:
              [beginner, elementary, intermediate, upper_intermediate, advanced]
        - name: search
          in: query
          description: Search by title or description
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListResponse"
              examples:
                default:
                  value:
                    provider:
                    id: "busuu"
                    name: "Busuu"
                    description: "Language learning platform"
                    logoUrl: "https://path/to/logo.jpg"
                    data:
                      - id: "pack_level_en_a1"
                        title: "English A1 - Beginner"
                        description: "Complete beginner course for English language learning"
                        level: "A1"
                        difficulty:
                        value: "beginner"
                        label: "Beginner"
                        order: 1
                        launchUrl: "https://sso.busuu.com/saml/{{institutionId}}/login?course={{courseId}}"
                        duration: 1110
                        language: "English"
                        thumbnailUrl: "https://cdn.busuu.com/courses/en-a1-thumbnail.jpg"
                        status: "active"
                        publishedAt: "2025-01-20T21:01:58Z"
                        createdAt: "2025-01-20T21:01:58Z"
                        updatedAt: "2025-01-20T21:01:58Z"
                      - id: "pack_level_en_a2"
                        title: "English A2 - Elementary"
                        description: "Elementary English course for language learners"
                        level: "A2"
                        difficulty:
                        value: "elementary"
                        label: "Elementary"
                        order: 2
                        launchUrl: "https://sso.busuu.com/saml/{{institutionId}}/login?course={{courseId}}"
                        duration: 1200
