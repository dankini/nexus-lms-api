  /progress/{id}:
    get:
      summary: Get specific progress record
      description: |
        Retrieve complete information about a specific learning progress record by its unique 
        identifier (UUID).

        **Path Parameters:**
        - `id`: Progress record UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Response:** Single Progress object (not wrapped in data array)

        **Progress States:**

        **In-Progress:**
        - `progressPercentage`: 0-99
        - `completedAt`: null
        - `result`: null
        - `score`: null
        - `learningDuration`: typically 0 (may increment based on implementation)

        **Completed:**
        - `progressPercentage`: 100
        - `completedAt`: timestamp when finished
        - `result`: "pass" or "fail"
        - `score`: final score 0-100
        - `learningDuration`: populated with course duration

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Check specific progress status (200): `GET /progress/{id}`
        - Verify completion details (200): Review `result`, `score`, `completedAt` fields
        - Track learning journey for single enrollment (200): Monitor progress over time
        - Audit progress record (200): Check timestamps and metrics
        - Progress record not found (404): Invalid or non-existent progress ID
        - Invalid ID format (400): Malformed UUID
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - List all progress: `GET /progress`
        - Get user's progress (better structure): `GET /users/{id}/progress` (use `userId` from this record)
        - Get user details: `GET /users/{userId}` (use `userId` from this record)
        - Get course details: `GET /courses/{courseId}` (use `courseId` from this record)
      tags:
        - Progress
      parameters:
        - $ref: "#/components/parameters/ProgressId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/progress:
    get:
      summary: Get user progress
      description: |
        Retrieve all learning progress records for a specific user with user context provided 
        separately.

        **Path Parameters:**
        - `id`: User UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "lastAccessedAt:desc")
        - `status`: Filter by "in_progress" or "completed"
        - `result`: Filter by "pass" or "fail"

        **Response Structure:**
        - `user`: Lightweight user context (id, userId, email) - provided once at top level to better represent that all progress belongs to this user
        - `data`: Array of Progress objects WITHOUT userId field (eliminates redundancy)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - View user's learning dashboard (200): `GET /users/{id}/progress`
        - Track individual student progress (200): Monitor all courses for this user
        - Generate user progress report (200): Export data for reporting
        - Filter user's completions (200): `GET /users/{id}/progress?status=completed`
        - Find in_progress courses (200): `GET /users/{id}/progress?status=in_progress`
        - Check pass/fail status (200): `GET /users/{id}/progress?result=pass`
        - Empty progress (200): New user with no enrollments returns `data: []`
        - User not found (404): Invalid or non-existent user ID
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get user details: `GET /users/{id}`
        - List all users: `GET /users`
        - Alternative endpoint (includes userId in each record): `GET /progress?userId={id}`
        - Get specific progress details: `GET /progress/{progressId}` (use `id` from progress array)
        - Get course details: `GET /courses/{courseId}` (use `courseId` from progress records)
      tags:
        - Progress
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: status
          in: query
          description: Filter by progress status
          schema:
            type: string
            enum: [in_progress, completed]
        - name: result
          in: query
          description: Filter by completion result
          schema:
            type: string
            enum: [pass, fail]
      responses:
        "200":
          description: Successful response
          content:
