          examples: ["a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"]

  responses:
    BadRequest:
      description: Bad request - invalid parameters or malformed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            default:
              value:
                code: "VALIDATION_ERROR"
                message: "Invalid request parameters"
                details:
                field: "page"
                reason: "Must be a positive integer"
                timestamp: "2025-01-20T21:01:58Z"
                requestId: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

    Unauthorized:
      description: Unauthorized - invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            default:
              value:
                code: "UNAUTHORIZED"
                message: "Invalid or expired access token"
                timestamp: "2025-01-20T21:01:58Z"
                requestId: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            default:
              value:
                code: "FORBIDDEN"
                message: "Insufficient permissions to access this resource"
                timestamp: "2025-01-20T21:01:58Z"
                requestId: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

    NotFound:
      description: Not found - resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            default:
              value:
                code: "NOT_FOUND"
                message: "Resource not found"
                timestamp: "2025-01-20T21:01:58Z"
                requestId: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            default:
              value:
                code: "INTERNAL_ERROR"
                message: "An unexpected error occurred"
                timestamp: "2025-01-20T21:01:58Z"
                requestId: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

tags:
  - name: Authentication
    description: "API authentication and token management. Use OAuth2 client credentials flow to obtain JWT access tokens. Tokens are required for all endpoints except /auth/token and /utilities/health."

  - name: Users
    description: "Enhanced user information and management. Access user data with organisational context including institution, department, role, and team assignments. Supports filtering by status, role, and department."

  - name: Courses
    description: "Optimised course catalogue with provider metadata. Courses organised by CEFR levels (A1-C1) with difficulty ratings and SSO launch URLs for seamless integration."

  - name: Progress
    description: "Aligned learning progress tracking. Track course completion status, lesson progress, and learning duration. Note: /users/{id}/progress endpoint returns user context separately to eliminate redundancy."

  - name: Utilities
    description: "System utilities and health checks. Health endpoint requires no authentication and returns API status, version, and uptime. Use for monitoring and version verification."
