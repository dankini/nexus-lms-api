openapi: 3.1.0
info:
  title: Busuu Nexus API
  description: |
    A public-facing API for LMS integrations and data access.

    This API provides read-only access to core Busuu learning data including:
    - Enhanced user information with organisational context
    - Optimised course catalogs with provider-level metadata
    - Aligned progress tracking with course duration consistency
    - Live lesson tracking with aggregation and summary statistics

    Designed for enterprise LMS connectors and institutional integrations.

    **Design Phase:**
    - Server URLs to be determined during implementation.
    - For testing, use the Postman mock server.

    **Updates:**

    **04 November 2025:**
    Enhanced endpoint descriptions with:
    - Detailed parameter explanations and use cases
    - HTTP status codes in use case examples
    - Cross-references between related endpoints
    - Standardised common use cases format

    **05 November 2025:**
    Added live lesson endpoints:
    - to-do
    - to-do

  version: 0.5.0
  contact:
    name: Busuu API Team
    email: api-support@busuu.com
  license:
    name: Proprietary
    url: https://busuu.com/terms

servers:
  - url: https://api.example.com/v1
    description: Production server (URL to be determined)
  - url: https://api-staging.example.com/v1
    description: Staging server (URL to be determined)

security:
  - BearerAuth: []

paths:
  # Authentication
  /auth/token:
    post:
      summary: Create access token
      operationId: createAccessToken
      description: |
        Authenticate using OAuth2 client credentials flow and receive a JWT access token for API access.

        The access token expires after 3600 seconds (1 hour). Send the token in the Authorization
        header as "Bearer {{access_token}}" for all authenticated endpoints.

        **Request Body:**
        - client_id: Your API client identifier
        - client_secret: Your API client secret
        - grant_type: Must be "client_credentials"
        - scope: Requested permissions (optional)

        **Response:**
        - access_token: JWT token for authentication
        - token_type: Always "Bearer"
        - expires_in: Token lifetime in seconds (3600)
        - scope: Granted permissions

        **Authentication:** Not required (this endpoint generates the token)

        **Common Use Cases:**
        - Initial authentication (200): `POST /auth/token` with valid credentials
        - Token refresh when expired (200): Request new token with same credentials
        - Obtaining specific permission scopes (200): Include `scope` parameter in request
        - Invalid credentials (401): Will return authentication error

        **Related Endpoints:**
        - Use this token for all authenticated endpoints (see `Authorization` header requirement)
        - Test token validity with `GET /utilities/health` (requires no auth) or `GET /users` (requires auth)
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - client_id
                - client_secret
                - grant_type
              properties:
                client_id:
                  type: string
                  description: Client identifier
                  examples: ["client-id-here"]

                client_secret:
                  type: string
                  description: Client secret
                  examples: ["client-secret-here"]

                grant_type:
                  type: string
                  enum: [client_credentials]
                  description: OAuth2 grant type
                  examples: ["client_credentials"]

                scope:
                  type: string
                  description: Requested permissions scope
                  examples: ["read:users read:courses read:progress"]

      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Bearer token for API access
                    examples: ["eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."]

                  token_type:
                    type: string
                    enum: [Bearer]
                    examples: ["Bearer"]

                  expires_in:
                    type: integer
                    description: Token expiration time in seconds
                    examples: [3600]

                  scope:
                    type: string
                    description: Granted permissions scope
                    examples: ["read:users read:courses read:progress"]

        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  # Users
  /users:
    get:
      summary: List all users
      operationId: listUsers
      description: |
        Retrieve a paginated list of all users with organisational context including institution, department, role, and team assignments.

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "createdAt:desc")
        - `status`: Filter by "active" or "removed" status
        - `role`: Filter by "admin", "team lead", or "student"
        - `department`: Filter by department name
        - `search`: Search by name or email (partial match)

        **Response:**
        - data: Array of User objects with full profile details
        - pagination: Metadata including page, limit, total, totalPages, hasNext, hasPrevious

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - List active users (200): `GET /users?status=active`
        - Find admins (200): `GET /users?role=admin`
        - Search by name (200): `GET /users?search=john`
        - Filter by department (200): `GET /users?department=Engineering&limit=50`
        - Empty result set (200): Query with no matches returns `data: []`
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get specific user details: `GET /users/{id}`
        - View user's learning progress: `GET /users/{id}/progress`
        - View user's live lessons: `GET /users/{id}/live-lessons`
        - To authenticate first: `POST /auth/token`
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: status
          in: query
          description: Filter by user status
          schema:
            type: string
            enum: [active, removed]
        - name: role
          in: query
          description: Filter by user role
          schema:
            type: string
            enum: [admin, team lead, student]
        - name: department
          in: query
          description: Filter by department
          schema:
            type: string
        - name: search
          in: query
          description: Search by name or email
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
