  # Live Lessons
  /live-lessons:
    get:
      summary: List all live lessons
      operationId: listLiveLessons
      description: |
        Retrieve a paginated list of all live lesson records across all users.
        Use for reporting, analytics, and cross-user lesson monitoring.

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "scheduledAt:desc")
        - `userId`: Filter by specific user UUID
        - `userEmail`: Filter by user email address
        - `type`: Filter by "group" or "private"
        - `language`: Filter by language code (e.g., "ES", "FR", "EN")
        - `level`: Filter by CEFR level (A1, A2, B1, B2, C1)
        - `status`: Filter by "pending", "completed", "cancelled", or "missed"
        - `dateFrom`: Filter lessons from this date (ISO 8601)
        - `dateTo`: Filter lessons up to this date (ISO 8601)

        **Response Structure:**
        - `data`: Array of LiveLesson objects (includes userId since this is cross-user list)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Live Lesson Fields Include:**
        - Identity: id, userId, userEmail
        - Lesson details: type (group/private), language, level
        - Status: status (pending/completed/cancelled/missed)
        - Timing: scheduledAt
        - Timestamps: createdAt, updatedAt

        **Lesson Duration:**
        Each live lesson is fixed at 45 minutes. Total minutes = number of lessons * 45.

        **Design Philosophy:**
        - This design supports both basic use cases (learning time calculation via summary) and advanced use cases (detailed lesson tracking, filtering, analytics).
        - The summary statistics enable simple calculations (e.g., learning time = totalLessonsCompleted × 45 minutes) without requiring full lesson data.

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Report on completed lessons (200): `GET /live-lessons?status=completed`
        - Track specific user (200): `GET /live-lessons?userId={uuid}`
        - Find lessons by language (200): `GET /live-lessons?language=ES`
        - Filter by lesson type (200): `GET /live-lessons?type=private`
        - Find lessons in date range (200): `GET /live-lessons?dateFrom=2025-01-01&dateTo=2025-01-31`
        - Combine filters (200): `GET /live-lessons?status=completed&language=FR`
        - Empty result set (200): Query with no matches returns `data: []`
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get specific live lesson: `GET /live-lessons/{id}`
        - Get all live lessons for a user (with summary): `GET /users/{id}/live-lessons`
        - Get user details: `GET /users/{id}`
      tags:
        - Live Lessons
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: userId
          in: query
          description: Filter by user ID
          schema:
            type: string
            format: uuid
        - name: userEmail
          in: query
          description: Filter by user email
          schema:
            type: string
            format: email
        - name: type
          in: query
          description: Filter by lesson type
          schema:
            type: string
            enum: [group, private]
        - name: language
          in: query
          description: Filter by lesson language
          schema:
            type: string
        - name: level
          in: query
          description: Filter by CEFR level
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
        - name: status
          in: query
          description: Filter by lesson status
          schema:
            type: string
            enum: [pending, completed, cancelled, missed]
        - name: dateFrom
          in: query
          description: Filter lessons from this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          description: Filter lessons up to this date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LiveLesson"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
              examples:
                default:
                  value:
                    data:
                      - id: "68235e4f-fa67-27e9-d64d-8339a1b2c3d4"
                        userId: "f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"
                        userEmail: "john.doe@example.com"
                        type: "group"
                        language: "ES"
                        level: "A1"
                        status: "completed"
                        scheduledAt: "2025-01-20T10:00:00Z"
                        createdAt: "2025-01-15T08:00:00Z"
                        updatedAt: "2025-01-20T10:45:00Z"
                      - id: "78246e5f-gb78-38fa-e75e-9440b2c3d4e5"
                        userId: "f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"
                        userEmail: "john.doe@example.com"
                        type: "private"
                        language: "FR"
                        level: "B1"
                        status: "pending"
                        scheduledAt: "2025-01-25T14:30:00Z"
                        createdAt: "2025-01-18T09:00:00Z"
                        updatedAt: "2025-01-18T09:00:00Z"
                      - id: "88257f6g-hc89-49gb-f86f-0551c3d4e5f6"
                        userId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
