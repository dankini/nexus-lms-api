components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/token endpoint

  parameters:
    Page:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
        examples: [1]

    Limit:
      name: limit
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
        examples: [25]

    Sort:
      name: sort
      in: query
      description: Sort order (field:direction)
      schema:
        type: string
        examples: ["createdAt:desc"]

    UserId:
      name: id
      in: path
      required: true
      description: User identifier (UUID)
      schema:
        type: string
        format: uuid
        examples: ["f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"]

    CourseId:
      name: id
      in: path
      required: true
      description: Course identifier
      schema:
        type: string
        examples: ["pack_level_en_a1"]

    ProgressId:
      name: id
      in: path
      required: true
      description: Progress record identifier (UUID)
      schema:
        type: string
        format: uuid
        examples: ["b2469a11-b5a6-4c7d-8e9f-0a1b2c3d4e5f"]

    LessonId:
      name: id
      in: path
      required: true
      description: Live lesson identifier (UUID)
      schema:
        type: string
        format: uuid
        examples: ["68235e4f-fa67-27e9-d64d-8339a1b2c3d4"]

  schemas:
    # Response Schemas
    CourseListResponse:
      type: object
      required:
        - provider
        - data
        - pagination
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
