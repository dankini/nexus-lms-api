  /users/{id}/progress:
    get:
      summary: Get user progress
      operationId: listUserProgress
      description: |
        Retrieve a paginated list of learning progress records for a specific user.

        This endpoint returns the user's identification context plus an array of progress entries
        (without userId inside each entry) and pagination metadata.

        **Path Parameters:**
        - `id`: User UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Query Parameters:**
        - `status`: Filter by progress status (`in_progress`, `completed`)
        - `result`: Filter by completion outcome (`pass`, `fail`)
        - `page`, `limit`, `sort`: Standard pagination and sorting controls

        **Response:**
        - `user`: Lightweight user context (`id`, `userId`, `email`)
        - `data`: Array of progress records (no `userId` field)
        - `pagination`: Metadata including `page`, `limit`, `total`, `totalPages`, `hasNext`, `hasPrevious`

        **Progress States:**
        - `in_progress`:
          - `progressPercentage`: 0–99
          - `completedAt`: null
          - `result`: null
          - `score`: null
          - `learningDuration`: typically 0 (implementation-dependent during in_progress)
        - `completed`:
          - `progressPercentage`: 100
          - `completedAt`: timestamp when finished
          - `result`: `pass` or `fail`
          - `score`: final score 0–100
          - `learningDuration`: populated with course duration

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Get all progress for a user (200): `GET /users/{id}/progress`
        - Filter to only completed records (200): `GET /users/{id}/progress?status=completed`
        - Find passes (200): `GET /users/{id}/progress?status=completed&result=pass`
        - Empty result set (200): Returns `data: []` with pagination metadata
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token
        - User not found (404): Non-existent user ID

        **Related Endpoints:**
        - List all progress (cross-user): `GET /progress`
        - Get user details: `GET /users/{id}`
        - Get course details: `GET /courses/{id}`
      tags:
        - Progress
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: status
