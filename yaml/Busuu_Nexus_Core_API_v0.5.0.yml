  /users/{id}:
    get:
      summary: Get specific user
      operationId: getUser
      description: |
        Retrieve complete information about a specific user by their unique identifier (UUID).

        Returns full user profile including core identity (id, userId, institutionId, email),
        profile details (name, department, country), organisational context (status, role,
        employeeId, team), and timestamps (created, updated, expiration, last active, deleted).

        **Path Parameters:**
        - `id`: User UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Response:** Single User object (not wrapped in data array)

        **Notable Fields:**
        - `status`: Either "active" or "removed"
        - `role`: One of "admin", "team lead", or "student"
        - `removedAt`: Nullable - only populated for removed users
        - Several profile fields are nullable: username, firstName, lastName, department, countryCode, employeeId, team

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Get full user profile for display (200): `GET /users/{id}`
        - Verify user exists before operations (200 or 404): Check response status
        - Check user's organisational context and permissions (200): Review `role`, `department`, `team` fields
        - User not found (404): Invalid or non-existent user ID
        - Invalid ID format (400): Malformed UUID
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - List all users: `GET /users`
        - View this user's learning progress: `GET /users/{id}/progress`
        - View this user's live lessons: `GET /users/{id}/live-lessons`
        - Find progress records for this user: `GET /progress?userId={id}`
      tags:
        - Users
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
