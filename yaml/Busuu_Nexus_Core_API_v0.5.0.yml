  /live-lessons/{id}:
    get:
      summary: Get specific live lesson
      operationId: getLiveLesson
      description: |
        Retrieve complete information about a specific live lesson by its unique
        identifier (UUID).

        **Path Parameters:**
        - `id`: Live lesson UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Response:** Single LiveLesson object (not wrapped in data array)

        **Lesson Status Values:**
        - `pending`: Lesson is scheduled but not yet completed
        - `completed`: Lesson was successfully completed
        - `cancelled`: Lesson was cancelled before it occurred
        - `missed`: Lesson was scheduled but user did not attend

        **Design Philosophy:**
        - This design supports both basic use cases (learning time calculation via summary) and advanced use cases (detailed lesson tracking, filtering, analytics).
        - The summary statistics enable simple calculations (e.g., learning time = totalLessonsCompleted × 45 minutes) without requiring full lesson data.

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Check specific lesson status (200): `GET /live-lessons/{id}`
        - Verify lesson details (200): Review `type`, `language`, `level` fields
        - Audit lesson record (200): Check timestamps and status
        - Live lesson not found (404): Invalid or non-existent lesson ID
        - Invalid ID format (400): Malformed UUID
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - List all live lessons: `GET /live-lessons`
        - Get user's live lessons (with summary): `GET /users/{userId}/live-lessons` (use `userId` from this record)
        - Get user details: `GET /users/{userId}` (use `userId` from this record)
      tags:
        - Live Lessons
      parameters:
        - $ref: "#/components/parameters/LessonId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveLesson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/live-lessons:
    get:
      summary: Get user live lessons
      operationId: listUserLiveLessons
      description: |
        Retrieve all live lesson records for a specific user with user context and
        summary statistics provided separately.

        **Path Parameters:**
        - `id`: User UUID (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "scheduledAt:desc")
        - `type`: Filter by "group" or "private"
        - `language`: Filter by language code
        - `level`: Filter by CEFR level (A1, A2, B1, B2, C1)
        - `status`: Filter by "pending", "completed", "cancelled", or "missed"
        - `dateFrom`: Filter lessons from this date (ISO 8601)
        - `dateTo`: Filter lessons up to this date (ISO 8601)

        **Response Structure:**
        - `user`: Lightweight user context (id, userId, email) - provided once at top level
        - `summary`: Aggregated statistics for all live lessons
        - `data`: Array of LiveLesson objects WITHOUT userId and userEmail fields (eliminates redundancy)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Summary Statistics Include:**
        - `totalLessonsPending`: Count of lessons with status "pending"
        - `totalLessonsCompleted`: Count of lessons with status "completed"
        - `totalLessonsCancelled`: Count of lessons with status "cancelled"
        - `totalLessonsMissed`: Count of lessons with status "missed"

        **Key Design:**
        User information and summary statistics provided once at top level instead of
        repeated in every lesson record. This reduces payload size, improves semantic
        clarity, and better represents that all lessons belong to this user. Both userId
        and userEmail are excluded from individual lesson records since they are available
        in the top-level user object.

        **Design Philosophy:**
        - This design supports both basic use cases (learning time calculation via summary) and advanced use cases (detailed lesson tracking, filtering, analytics).
        - The summary statistics enable simple calculations (e.g., learning time = totalLessonsCompleted × 45 minutes) without requiring full lesson data.

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - View user's live lesson dashboard (200): `GET /users/{id}/live-lessons`
        - Track individual student live lessons (200): Monitor all live lessons for this user
        - Generate user live lesson report (200): Export data with summary statistics
        - Filter user's completed lessons (200): `GET /users/{id}/live-lessons?status=completed`
        - Find pending lessons (200): `GET /users/{id}/live-lessons?status=pending`
        - Filter by language (200): `GET /users/{id}/live-lessons?language=ES`
        - Empty lessons (200): User with no live lessons returns `data: []` and summary with zeros
        - User not found (404): Invalid or non-existent user ID
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get user details: `GET /users/{id}`
        - List all users: `GET /users`
        - Alternative endpoint (includes userId in each record): `GET /live-lessons?userId={id}`
        - Get specific lesson details: `GET /live-lessons/{lessonId}` (use `id` from data array)
      tags:
        - Live Lessons
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: type
          in: query
          description: Filter by lesson type
          schema:
            type: string
            enum: [group, private]
        - name: language
          in: query
          description: Filter by lesson language
          schema:
            type: string
        - name: level
          in: query
          description: Filter by CEFR level
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
        - name: status
          in: query
          description: Filter by lesson status
          schema:
            type: string
            enum: [pending, completed, cancelled, missed]
        - name: dateFrom
          in: query
          description: Filter lessons from this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          description: Filter lessons up to this date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLiveLessonsResponse"
              examples:
                default:
                  value:
                    user:
                      id: "f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"
                      userId: "a2b3c4d5-e6f7-4a8b-9c0d-1e2f3a4b5c6d"
                      email: "john.doe@example.com"
                    summary:
                      totalLessonsPending: 2
                      totalLessonsCompleted: 6
                      totalLessonsCancelled: 2
                      totalLessonsMissed: 2
                    data:
                      - id: "68235e4f-fa67-27e9-d64d-8339a1b2c3d4"
                        type: "group"
                        language: "ES"
                        level: "A1"
                        status: "completed"
                        scheduledAt: "2025-01-20T10:00:00Z"
                        createdAt: "2025-01-15T08:00:00Z"
                        updatedAt: "2025-01-20T10:45:00Z"
                      - id: "78246e5f-gb78-38fa-e75e-9440b2c3d4e5"
                        type: "private"
                        language: "FR"
                        level: "B1"
                        status: "pending"
                        scheduledAt: "2025-01-25T14:30:00Z"
                        createdAt: "2025-01-18T09:00:00Z"
