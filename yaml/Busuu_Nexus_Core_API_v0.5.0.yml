                  pagination:
                    $ref: "#/components/schemas/Pagination"
              examples:
                default:
                  value:
                    data:
                      - id: "2ed43c78-b5a6-4c7d-8e9f-0a1b2c3d4e5f"
                        userId: "f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"
                        courseId: "pack_level_en_a1"
                        status: "completed"
                        progressPercentage: 100
                        lessonsCompleted: 20
                        lessonsTotal: 20
                        result: "pass"
                        score: 85
