  /courses/{id}:
    get:
      summary: Get specific course
      operationId: getCourse
      description: |
        Retrieve complete information about a specific language learning course by its unique
        identifier. Response includes provider context (Busuu) at the top level.

        **Path Parameters:**
        - `id`: Course identifier (format: pack_level_language_level, e.g., "pack_level_en_a1")

        **Response Structure:**
        - `provider`: Content provider information (Busuu)
        - `course`: Single Course object with complete details

        **Course Fields Include:**
        - Core: id, title, description, language
        - CEFR: level (A1-C1)
        - Difficulty: Structured object with value, label, and numeric order (1-5)
        - Integration: launchUrl with SSO template variables
        - Metadata: duration (minutes), thumbnailUrl, status (active/archived)
        - Timestamps: publishedAt, createdAt, updatedAt

        **Launch URL Usage:**
        Template format: `https://sso.busuu.com/saml/{{busuuInstitutionId}}/login?course={{courseId}}&lang={{language}}&level={{level}}`
        Replace `{{busuuInstitutionId}}`, `{{courseId}}`, `{{language}}` and `{{level}}` with actual values before use.

        **Authentication:** Required (Bearer token)

         **Common Use Cases:**
        - Get course details for display (200): `GET /courses/{id}`
        - Retrieve launch URL for SSO integration (200): Extract `launchUrl` and replace template variables
        - Check course status before enrollment (200): Review `status` field (active/archived)
        - View course duration for planning (200): Check `duration` field in minutes
        - Course not found (404): Invalid or non-existent course ID
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - List all courses: `GET /courses`
        - View progress for this course: `GET /progress?courseId={id}`
        - Filter courses by level: `GET /courses?level={A1-C1}`
      tags:
        - Courses
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # Progress
  /progress:
    get:
      summary: List all progress records
      operationId: listProgressRecords
      description: |
        Retrieve a paginated list of all learning progress records across all users and courses.
        Use for reporting, analytics, and cross-user progress monitoring.

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "updatedAt:desc")
        - `userId`: Filter by specific user UUID
        - `courseId`: Filter by specific course ID
        - `status`: Filter by "in_progress" or "completed"
        - `result`: Filter by "pass" or "fail" (only applies to completed courses)

        **Response Structure:**
        - `data`: Array of Progress objects (includes userId since this is cross-user list)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Progress Fields Include:**
        - Identity: id, userId, courseId
        - Status: status (in_progress/completed)
        - Metrics: progressPercentage (0-100), lessonsCompleted, lessonsTotal
        - Completion: result (pass/fail), score (0-100)
        - Duration: learningDuration (minutes) - populated when completed
        - Timestamps: startedAt, completedAt, lastAccessedAt, createdAt, updatedAt

        **Learning Duration Behavior:**
        - Initialized to 0 when progress record created
        - Populated with course.duration when status becomes 'completed'
        - Represents standard course duration, not actual time spent

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Report on completions (200): `GET /progress?status=completed`
        - Track specific user (200): `GET /progress?userId={uuid}`
        - Monitor specific course (200): `GET /progress?courseId=pack_level_en_a1`
        - Find failures (200): `GET /progress?result=fail`
        - Find in_progress enrollments (200): `GET /progress?status=in_progress`
        - Combine filters (200): `GET /progress?status=completed&result=pass`
        - Empty result set (200): Query with no matches returns `data: []`
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get specific progress record: `GET /progress/{id}`
        - Get all progress for a user: `GET /users/{id}/progress`
        - Get user details: `GET /users/{id}`
        - Get course details: `GET /courses/{id}`
      tags:
        - Progress
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: userId
          in: query
          description: Filter by user ID
          schema:
            type: string
        - name: courseId
          in: query
          description: Filter by course ID
          schema:
            type: string
        - name: status
          in: query
          description: Filter by progress status
          schema:
            type: string
            enum: [in_progress, completed]
        - name: result
          in: query
          description: Filter by completion result
          schema:
            type: string
            enum: [pass, fail]
      responses:
        "200":
          description: Successful response
          content:
            application/json:
