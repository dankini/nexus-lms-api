          type: array
          items:
            $ref: "#/components/schemas/ProgressWithoutUserId"
        pagination:
          $ref: "#/components/schemas/Pagination"

    UserLiveLessonsResponse:
      type: object
      required:
        - user
        - summary
        - data
        - pagination
      properties:
        user:
          $ref: "#/components/schemas/UserContext"
        summary:
