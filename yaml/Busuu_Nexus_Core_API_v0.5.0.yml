          items:
            $ref: "#/components/schemas/Course"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CourseDetailResponse:
      type: object
      required:
        - provider
        - course
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
