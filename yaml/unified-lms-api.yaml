      security:
        - JWT-auth: []
  /v1/oauth/token:
    post:
      operationId: OAuthController_issueToken
      summary: Get OAuth2 access token
      description: Returns an access token and refresh token using client credentials flow
      parameters:
        - name: authorization
          required: true
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - client_credentials
                client_id:
                  type: string
                  minLength: 1
                  maxLength: 64
                client_secret:
                  type: string
                  minLength: 1
                  maxLength: 64
                scope:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        enum:
                          - courses:read
                        x-enumNames:
                          - COURSES_READ
                    - type: string
              required:
                - grant_type
                - scope
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    enum:
                      - Bearer
                  expires_in:
                    type: number
                  refresh_token:
                    type: string
                required:
                  - access_token
                  - token_type
                  - expires_in
        '400':
          description: Invalid request
        '401':
          description: Invalid client credentials
      tags:
        - OAuth
  /v1/oauth/refresh:
    post:
      operationId: OAuthController_refreshToken
      summary: Refresh access token
      description: Returns a new access token and refresh token using a valid refresh token
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  minLength: 1
              required:
                - refresh_token
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    enum:
                      - Bearer
                  expires_in:
                    type: number
                  refresh_token:
                    type: string
                required:
                  - access_token
                  - token_type
                  - expires_in
        '401':
          description: Invalid or expired refresh token
      tags:
        - OAuth
components:
  securitySchemes:
    JWT-auth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT
      description: Enter JWT token
      in: header
  schemas: {}
