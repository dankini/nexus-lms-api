                        LastModifiedUTC:
                          type: string
                          format: date-time
                        Languages:
                          type: array
                          items:
                            type: string
                        Duration:
                          description: Duration in the format HH:MM:SS
                          type: string
                          pattern: ^\d{2}:\d{2}:\d{2}$
                        Subjects:
                          type: array
                          items:
                            type: string
                        Keywords:
                          type: string
                          maxLength: 999
                        IsMobile:
