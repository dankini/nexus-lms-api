      tags:
        - LMS
      parameters:
        - name: lmsName
          required: true
          in: path
          schema:
            description: Name of the LMS
            type: string
            enum:
              - cornerstone
            x-enumNames:
              - CORNERSTONE
        - name: ciid
          required: true
          in: query
          description: CIID (Client ID) of the client of the LMS
          schema:
            minLength: 1
            format: uuid
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                description: Returned when the courses overview is successfully retrieved for the specified LMS and client
                type: array
                items:
                  oneOf:
                    - type: object
                      properties:
                        ID:
                          type: string
                          maxLength: 49
                        Title:
                          type: string
                          maxLength: 499
                        URL:
                          type: string
                          format: uri
                        IsActive:
                          type: boolean
                        Description:
                          type: string
                          maxLength: 4999
                        Thumbnail:
                          type: string
                          format: uri
                        Version:
                          type: string
                          maxLength: 49
                        Owners:
                          type: array
