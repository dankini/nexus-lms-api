    Error:
      type: object
      required:
        - code
        - message
        - timestamp
      properties:
        code:
          type: string
          description: Error code
          examples: ["VALIDATION_ERROR"]

        message:
          type: string
          description: Human-readable error message
          examples: ["Invalid request parameters"]

        details:
          type: object
          description: Additional error details
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          examples: ["2025-01-20T21:01:58Z"]

        requestId:
          type: string
          format: uuid
          description: Unique request identifier for debugging (UUID)
          examples: ["a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"]

  responses:
    BadRequest:
      description: Bad request - invalid parameters or malformed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            default:
              value:
                code: "VALIDATION_ERROR"
                message: "Invalid request parameters"
                details:
                  field: "page"
                  reason: "Must be a positive integer"
                timestamp: "2025-01-20T21:01:58Z"
                requestId: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"

    Unauthorized:
