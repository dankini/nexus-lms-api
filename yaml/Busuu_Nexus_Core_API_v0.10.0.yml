        - name: dateFrom
          in: query
          description: Filter lessons from this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          description: Filter lessons up to this date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Successful response
          content:
