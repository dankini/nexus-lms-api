  /users/{institutionUserId}/certificates:
    get:
      summary: Get user certificates
      operationId: listUserCertificates
      description: |
        Retrieve all certificate records for a specific user with user context and
        summary statistics provided separately.

        **Path Parameters:**
        - `institutionUserId`: Institution-specific user identifier (UUID format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "issuedAt:desc")
        - `courseId`: Filter by specific course ID
        - `language`: Filter by language code
        - `level`: Filter by CEFR level (A1, A2, B1, B2, C1)
        - `status`: Filter by "active", "expired", or "revoked"
        - `dateFrom`: Filter certificates issued from this date (ISO 8601)
        - `dateTo`: Filter certificates issued up to this date (ISO 8601)

        **Response Structure:**
        - `user`: Lightweight user context (institutionUserId, email) - provided once at top level
        - `summary`: Aggregated statistics for all certificates
        - `data`: Array of Certificate objects WITHOUT institutionUserId and userEmail fields (eliminates redundancy)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Note:** Multiple certificates are allowed for the same user and course combination. Each certificate
        represents a separate issuance with its own immutable grade. Users can retake course assessments and
        receive new certificates with different grades. Filtering by `courseId` will return all certificates
        for that course.

        **Summary Statistics Include:**
        - `totalCertificates`: Total number of certificates
        - `totalCertificatesActive`: Count of certificates with status "active"
        - `totalCertificatesExpired`: Count of certificates with status "expired"
        - `totalCertificatesRevoked`: Count of certificates with status "revoked"

        **Key Design:**
        User information and summary statistics provided once at top level instead of
        repeated in every certificate record. This reduces payload size, improves semantic
        clarity, and better represents that all certificates belong to this user. Both institutionUserId
        and userEmail are excluded from individual certificate records since they are available
        in the top-level user object.

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - View user's certificate dashboard (200): `GET /users/{institutionUserId}/certificates`
        - Track individual student certificates (200): Monitor all certificates for this user
        - Track course retakes (200): `GET /users/{institutionUserId}/certificates?courseId={courseId}` - Returns all certificates for a specific course, showing multiple issuances/retakes
        - Generate user certificate report (200): Export data with summary statistics
        - Filter user's active certificates (200): `GET /users/{institutionUserId}/certificates?status=active`
        - Find expired certificates (200): `GET /users/{institutionUserId}/certificates?status=expired`
        - Filter by language (200): `GET /users/{institutionUserId}/certificates?language=ES`
        - Filter by level (200): `GET /users/{institutionUserId}/certificates?level=B1`
        - Empty certificates (200): User with no certificates returns `data: []` and summary with zeros
        - User not found (404): Invalid or non-existent user ID
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get user details: `GET /users/{institutionUserId}`
        - List all users: `GET /users`
        - Alternative endpoint (includes institutionUserId in each record): `GET /certificates?institutionUserId={institutionUserId}`
        - Get specific certificate details: `GET /certificates/{certificateId}` (use `id` from certificates array)
      tags:
        - Certificates
      parameters:
        - $ref: "#/components/parameters/InstitutionUserId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: courseId
          in: query
          description: Filter by course ID
          schema:
            type: string
        - name: language
          in: query
          description: Filter by certificate language
          schema:
            type: string
            enum: [EN, ES, FR, DE, IT, PT, NL, JA, KO, PL, RU, TR, ZH, AR]
        - name: level
          in: query
          description: Filter by CEFR level
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
        - name: status
          in: query
          description: Filter by certificate status
          schema:
            type: string
            enum: [active, expired, revoked]
        - name: dateFrom
          in: query
          description: Filter certificates issued from this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          description: Filter certificates issued up to this date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCertificatesResponse"
              examples:
                default:
                  value:
                    user:
                      institutionUserId: "f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"
                      email: "john.doe@example.com"
                    summary:
                      totalCertificates: 5
                      totalCertificatesActive: 3
                      totalCertificatesExpired: 1
                      totalCertificatesRevoked: 1
                    data:
                      - id: "68235e4f-fa67-27e9-d64d-8339a1b2c3d4"
                        courseId: "pack_level_en_b2"
                        title: "English Upper Intermediate (B2)"
                        language: "EN"
                        level: "B2"
                        status: "active"
                        issuedAt: "2025-01-20T10:00:00Z"
                        expiresAt: null
