        - totalCertificatesExpired
        - totalCertificatesRevoked
      properties:
        totalCertificates:
          type: integer
          minimum: 0
          description: Total number of certificates
          examples: [5]

        totalCertificatesActive:
          type: integer
          minimum: 0
          description: Count of certificates with status "active"
          examples: [3]

