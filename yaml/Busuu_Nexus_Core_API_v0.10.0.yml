        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: institutionUserId
          in: query
          description: Filter by institution user ID
          schema:
            type: string
            format: uuid
        - name: userEmail
          in: query
          description: Filter by user email
          schema:
            type: string
            format: email
        - name: type
          in: query
          description: Filter by lesson type
          schema:
            type: string
            enum: [group, private]
        - name: language
          in: query
          description: Filter by lesson language
          schema:
            type: string
        - name: level
          in: query
          description: Filter by CEFR level
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
        - name: status
          in: query
          description: Filter by lesson status
          schema:
            type: string
            enum: [pending, completed, cancelled, missed]
        - name: dateFrom
          in: query
          description: Filter lessons from this date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          description: Filter lessons up to this date (ISO 8601)
          schema:
            type: string
