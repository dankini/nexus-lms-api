tags:
  - name: Authentication
    description: "API authentication and token management. Use OAuth2 client credentials flow to obtain JWT access tokens. Tokens are required for all endpoints except /auth/token and /utilities/health."

  - name: Users
    description: "Enhanced user information and management. Access user data with organisational context including institution, department, role, and team assignments. Supports filtering by status, role, and department."

  - name: Courses
    description: "Optimised course catalogue with provider metadata. Courses organised by CEFR levels (A1-C1) with difficulty ratings and SSO launch URLs for seamless integration."

  - name: Progress
    description: "Aligned learning progress tracking. Track course completion status, lesson progress, and learning duration. Note: /users/{institutionUserId}/progress endpoint returns user context separately to eliminate redundancy."

  - name: Live Lessons
    description: "Live lesson tracking with stats. Tracks bookings, completions, cancellations, and no-shows. Each lesson is 45 minutes."

  - name: Certificates
    description: "Certificate tracking and digital credentialing with language, CEFR level, status, and expiration dates. Supports external display of certifications."

  - name: Utilities
    description: "System utilities and health checks. Health endpoint requires no authentication and returns API status, version, and uptime. Use for monitoring and version verification."
