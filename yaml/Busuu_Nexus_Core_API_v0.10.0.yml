          type: integer
          minimum: 0
          description: Count of certificates with status "expired"
          examples: [1]

        totalCertificatesRevoked:
          type: integer
          minimum: 0
          description: Count of certificates with status "revoked"
          examples: [1]

    Certificate:
      type: object
      description: >
        Certificate model representing a digital credential issued upon course completion.
        Multiple certificates are allowed for the same user and course combination - each certificate
        represents a separate issuance. For example, a user can retake a course assessment and receive
        a new certificate with a different grade. Each certificate maintains its own immutable grade
        snapshot at issuance time and references the source progress record via progressId.
      required:
        # 1. Primary Identifier
        - id
        # 2. Relationships
        - institutionUserId
        - userEmail
        - courseId
        # 3. Core Content
        - title
        - status
        # 4. Classification & Achievement
        - language
        - level
        # 5. Provider & Media
        - providerId
        - url
        # 6. Lifecycle Timestamps
        - issuedAt
      properties:
        # 1. Primary Identifier
        id:
          type: string
          format: uuid
          description: Unique certificate identifier
          examples: ["68235e4f-fa67-27e9-d64d-8339a1b2c3d4"]

        # 2. Relationships
        institutionUserId:
          type: string
          format: uuid
          description: Institution user identifier (foreign key to User.institutionUserId)
          examples: ["f1e2d3c4-b5a6-4c7d-8e9f-0a1b2c3d4e5f"]

        userEmail:
          type: string
          format: email
          description: User's email address
          examples: ["john.doe@example.com"]

        courseId:
          type: string
          description: Course identifier that this certificate is associated with
          examples: ["pack_level_en_b2"]

        progressId:
          type: string
          format: uuid
          description: Reference to the source progress record that this certificate is based on. The certificate grade is an immutable snapshot derived from the progress record's score at the time of certificate issuance.
          examples: ["2ed43c78-b5a6-4c7d-8e9f-0a1b2c3d4e5f"]

        # 3. Core Content
        title:
          type: string
          description: Title of the certificate
          examples: ["English Upper Intermediate (B2)"]

        status:
          type: string
          enum: [active, expired, revoked]
          description: Status of the certificate
          examples: ["active"]

        # 4. Classification & Achievement
        language:
          type: string
          enum: [EN, ES, FR, DE, IT, PT, NL, JA, KO, PL, RU, TR, ZH, AR]
          description: Language code for the certificate
          examples: ["EN"]

        level:
          type: string
          enum: [A1, A2, B1, B2, C1]
          description: CEFR language level
          examples: ["B2"]

        grade:
          type: string
          enum: [A+, A, A-, B+, B, B-, C+, C, C-, F]
          description: >
            Grade assigned to the certificate. This grade is a snapshot derived from the completion score
            in the associated progress record (referenced by progressId) at the time of certificate issuance.
            The grade is immutable and does not change after issuance, even if the source progress record is updated.

            Grading scale:
            - A+: 96-100
            - A: 93-95
            - A-: 90-92
            - B+: 87-89
            - B: 83-86
            - B-: 80-82
            - C+: 77-79
            - C: 73-76
            - C-: 70-72
            - F: 0-69
          examples: ["A"]

        # 5. Provider & Media
        providerId:
          type: string
          description: 'Certificate issuer/provider identifier (default: "Busuu Premium Language Learning")'
          examples: ["Busuu Premium Language Learning"]

        url:
          type: string
          format: uri
          description: URL to the online certificate or issuer
          examples:
            [
              "https://certificates.busuu.com/68235e4f-fa67-27e9-d64d-8339a1b2c3d4",
            ]

        thumbnailUrl:
          type: [string, "null"]
          format: uri
          description: URL of an image which will be shown in the LMS (optional)
          examples: ["https://cdn.busuu.com/certificates/en-b2-thumbnail.jpg"]

        # 6. Lifecycle Timestamps
        issuedAt:
          type: string
          format: date-time
          description: Date when the certificate was issued
          examples: ["2025-01-20T10:00:00Z"]

        expiresAt:
          type: [string, "null"]
          format: date-time
          description: Date when the certificate expires (null if non-expiring)
          examples: ["2026-01-20T10:00:00Z"]

        revokedAt:
          type: [string, "null"]
          format: date-time
          description: Timestamp when certificate was revoked (null if not revoked)
          examples: ["2025-06-15T10:00:00Z"]

    CertificateWithoutInstitutionUserId:
