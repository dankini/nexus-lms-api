  # Live Lessons
  /live-lessons:
    get:
      summary: List all live lessons
      operationId: listLiveLessons
      description: |
        Retrieve a paginated list of all live lesson records across all users.
        Use for reporting, analytics, and cross-user lesson monitoring.

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "scheduledAt:desc")
        - `institutionUserId`: Filter by specific institution user UUID
        - `userEmail`: Filter by user email address
        - `type`: Filter by "group" or "private"
        - `language`: Filter by language code (e.g., "ES", "FR", "EN")
        - `level`: Filter by CEFR level (A1, A2, B1, B2, C1)
        - `status`: Filter by "pending", "completed", "cancelled", or "missed"
        - `dateFrom`: Filter lessons from this date (ISO 8601)
        - `dateTo`: Filter lessons up to this date (ISO 8601)

        **Response Structure:**
        - `data`: Array of LiveLesson objects (includes institutionUserId since this is cross-user list)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Live Lesson Fields Include:**
        - Identity: id, institutionUserId, userEmail
        - Lesson details: type (group/private), language, level
        - Status: pending/completed/cancelled/missed
        - Timestamps: bookedAt, scheduledAt

        **Lesson Duration:**
        Each live lesson is fixed at 45 minutes. Total minutes = number of lessons * 45.

        **Design Philosophy:**
        - This design supports both basic use cases (learning time calculation via summary) and advanced use cases (detailed lesson tracking, filtering, analytics).
        - The summary statistics enable simple calculations (e.g., learning time = totalLessonsCompleted × 45 minutes) without requiring full lesson data.

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Report on completed lessons (200): `GET /live-lessons?status=completed`
        - Track specific user (200): `GET /live-lessons?institutionUserId={uuid}`
        - Find lessons by language (200): `GET /live-lessons?language=ES`
        - Filter by lesson type (200): `GET /live-lessons?type=private`
        - Find lessons in date range (200): `GET /live-lessons?dateFrom=2025-01-01&dateTo=2025-01-31`
        - Combine filters (200): `GET /live-lessons?status=completed&language=FR`
        - Empty result set (200): Query with no matches returns `data: []`
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get specific live lesson: `GET /live-lessons/{id}`
        - Get all live lessons for a user (with summary): `GET /users/{institutionUserId}/live-lessons`
        - Get user details: `GET /users/{institutionUserId}`
