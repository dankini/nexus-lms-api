  # Certificates
  /certificates:
    get:
      summary: List all certificates
      operationId: listCertificates
      description: |
        Retrieve a paginated list of all certificate records across all users.
        Use for reporting, analytics, and cross-user certificate monitoring.

        **Query Parameters:**
        - `page`, `limit`: Control pagination (default: page 1, limit 25, max 100)
        - `sort`: Order results by field (e.g., "issuedAt:desc")
        - `institutionUserId`: Filter by specific institution user UUID
        - `userEmail`: Filter by user email address
        - `courseId`: Filter by specific course ID
        - `language`: Filter by language code (e.g., "ES", "FR", "EN")
        - `level`: Filter by CEFR level (A1, A2, B1, B2, C1)
        - `status`: Filter by "active", "expired", or "revoked"
        - `dateFrom`: Filter certificates issued from this date (ISO 8601)
        - `dateTo`: Filter certificates issued up to this date (ISO 8601)

        **Response Structure:**
        - `data`: Array of Certificate objects (includes institutionUserId since this is cross-user list)
        - `pagination`: Metadata including page, limit, total, totalPages

        **Note:** Multiple certificates are allowed for the same user and course combination. Each certificate
        represents a separate issuance with its own immutable grade. Users can retake course assessments and
        receive new certificates with different grades. Filtering by `institutionUserId` and `courseId` together will
        return all certificates for that user/course combination.

        **Certificate Fields Include:**
        - Identity: id, institutionUserId, userEmail, courseId, progressId
        - Certificate details: title, language, level
        - Assessment: grade (immutable snapshot from completion score)
        - Status: status (active/expired/revoked)
        - Dates: issuedAt, expiresAt (nullable), revokedAt (nullable)
        - Metadata: url, providerId, thumbnailUrl (optional)

        **Authentication:** Required (Bearer token)

        **Common Use Cases:**
        - Report on all certificates (200): `GET /certificates`
        - Track specific user (200): `GET /certificates?institutionUserId={uuid}`
        - Find certificates by language (200): `GET /certificates?language=ES`
        - Filter by CEFR level (200): `GET /certificates?level=B1`
        - Find active certificates (200): `GET /certificates?status=active`
        - Find expired certificates (200): `GET /certificates?status=expired`
        - Filter by course (200): `GET /certificates?courseId=pack_level_en_a1`
        - Track multiple issuances (200): `GET /certificates?institutionUserId={uuid}&courseId={courseId}` - Returns all certificates for user/course, showing multiple issuances/retakes
        - Find certificates in date range (200): `GET /certificates?dateFrom=2025-01-01&dateTo=2025-01-31`
        - Combine filters (200): `GET /certificates?status=active&language=FR`
        - Empty result set (200): Query with no matches returns `data: []`
        - Invalid parameters (400): Incorrect parameter types or values
        - Missing authentication (401): Request without valid Bearer token

        **Related Endpoints:**
        - Get specific certificate: `GET /certificates/{id}`
        - Get all certificates for a user (with summary): `GET /users/{institutionUserId}/certificates`
        - Get user details: `GET /users/{institutionUserId}`
        - Get course details: `GET /courses/{id}`
      tags:
        - Certificates
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Sort"
        - name: institutionUserId
          in: query
          description: Filter by institution user ID
          schema:
            type: string
            format: uuid
        - name: userEmail
          in: query
          description: Filter by user email
          schema:
            type: string
            format: email
        - name: courseId
          in: query
          description: Filter by course ID
          schema:
            type: string
        - name: language
          in: query
          description: Filter by certificate language
